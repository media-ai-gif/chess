
<style>
.csq{width:46px;height:46px;display:flex;align-items:center;justify-content:center;position:relative;user-select:none}
.csq.cp{cursor:pointer}
.cov{position:absolute;inset:0;pointer-events:none}
.wp{font-size:30px;line-height:1;position:relative;z-index:1;color:#fffef0;-webkit-text-stroke:.8px #2c2c2c;text-shadow:0 1px 3px rgba(0,0,0,.55)}
.bp{font-size:30px;line-height:1;position:relative;z-index:1;color:#111;text-shadow:0 1px 2px rgba(255,255,255,.35)}
.ndot{width:7px;height:7px;border-radius:50%;padding:0;border:none;cursor:pointer;flex-shrink:0;transition:background .15s;min-width:0}
</style>

<div id="ca" style="padding:.875rem 0;font-family:var(--font-sans)">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem">
    <div>
      <div id="lmeta" style="font-size:10px;color:var(--color-text-tertiary);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px"></div>
      <div id="ltitle" style="font-size:18px;font-weight:500;color:var(--color-text-primary)"></div>
    </div>
    <div style="display:flex;gap:4px">
      <button id="bprev" aria-label="Назад"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
      <button id="bnext" aria-label="Вперёд"><i class="ti ti-arrow-right" aria-hidden="true"></i></button>
    </div>
  </div>
  <div style="height:2px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:1rem;overflow:hidden">
    <div id="pfill" style="height:100%;background:var(--color-text-tertiary);border-radius:2px;transition:width .35s ease;width:14.3%"></div>
  </div>
  <div style="display:grid;grid-template-columns:auto 1fr;gap:1rem;align-items:start">
    <div id="bwrap"></div>
    <div style="display:flex;flex-direction:column;gap:.625rem;min-width:0">
      <div style="background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.75rem">
        <p id="ltip" style="margin:0;font-size:13px;line-height:1.8;color:var(--color-text-primary)"></p>
      </div>
      <p id="lnote" style="margin:0;padding-left:.625rem;border-left:2px solid var(--color-border-secondary);font-size:12px;color:var(--color-text-secondary);line-height:1.7"></p>
      <div id="parea"></div>
      <div id="ndots" style="display:flex;gap:5px;padding-top:4px"></div>
    </div>
  </div>
</div>

<script>
var PC={K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙',k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'};
var FL=['a','b','c','d','e','f','g','h'];
var RK=['8','7','6','5','4','3','2','1'];

var LS=[
  {id:1,title:'Контролируй центр',sub:'Принцип №1',
   fen:'rnbqkbnr/pppp1ppp/8/4p3/4P3/8/PPPP1PPP/RNBQKBNR w KQkq e6 0 2',
   hl:{e4:'#56ab6077',e5:'#56ab6077',d4:'#c8921177',d5:'#c8921177'},
   tip:'Четыре центральных поля — e4, e5, d4, d5 — самые ценные на доске. Тот, кто контролирует центр, задаёт темп всей игры. Начинай ходами 1.e4 или 1.d4.',
   note:'Зелёным — поля, занятые пешками. Жёлтым — расширенный стратегический центр.'},
  {id:2,title:'Развивай фигуры',sub:'Принцип №2',
   fen:'r1bqkb1r/pppp1ppp/2n2n2/4p3/2B1P3/5N2/PPPP1PPP/RNBQK2R w KQkq - 4 4',
   hl:{c4:'#1976d277',f3:'#1976d277',c6:'#c6282877',f6:'#c6282877'},
   tip:'Каждый ход в дебюте — новая фигура. Конь и слон стремятся ближе к центру. Не ходи одной фигурой дважды до рокировки.',
   note:'Синим — фигуры белых (слон c4, конь f3). Красным — фигуры чёрных (конь c6, конь f6). Белые уже готовы рокировать!'},
  {id:3,title:'Рокируй вовремя',sub:'Принцип №3',
   fen:'r1bq1rk1/pppp1ppp/2n2n2/4p3/2B1P3/2NP1N2/PPP2PPP/R1BQK2R w KQ - 0 7',
   hl:{g8:'#56ab6077',f8:'#56ab6077',e1:'#c6282877'},
   tip:'Рокировка за один ход прячет короля и активирует ладью. Рокируй в первые 10 ходов! Неспрятанный король — постоянная мишень для атаки.',
   note:'Зелёным — чёрные уже рокировали, король в безопасности. Красным — белый король ещё в центре, это опасно!'},
  {id:4,title:'Проверяй угрозы',sub:'Главный навык',
   fen:'r1bqkb1r/ppp2ppp/2np1n2/4p3/2B1P3/2NP1N2/PPP2PPP/R1BQK2R w KQkq - 0 6',
   hl:{e4:'#e65c0066',e5:'#e65c0066',c4:'#fbc02d88',e1:'#c6282877'},
   tip:'Перед каждым ходом — три вопроса: (1) Что угрожает сопернику? (2) Все ли мои фигуры защищены? (3) После моего хода — не зеваю ли я что-то?',
   note:'Оранжевым — напряжение в центре. Жёлтым — слон c4 может попасть под удар. Красным — король ещё в центре!'},
  {id:5,title:'Вилка',sub:'Тактика: два удара',
   fen:'8/8/8/3N4/1q3k2/8/8/4K3 b - - 1 1',
   hl:{d5:'#7b1fa288',f4:'#c6282888',b4:'#e65c0088'},
   tip:'Вилка — одна фигура атакует двух врагов одновременно. Соперник может спасти только одну. Конь особенно грозен: его прыжок трудно предугадать.',
   note:'Конь d5 (фиолетовый) атакует и короля f4 (красный), и ферзя b4 (оранжевый) одновременно — классическая вилка!'},
  {id:6,title:'Связка',sub:'Тактика: нельзя уйти',
   fen:'r1bqk2r/ppp2ppp/2n1pn2/3p4/1b1PP3/2N2N2/PPP1BPPP/R1BQK2R w KQkq - 0 6',
   hl:{b4:'#7b1fa288',c3:'#c6282888',e1:'#1565c088'},
   tip:'Связка — фигура не может уйти, не оставив под ударом более ценную позади. Слон b4 связывает коня c3: уйди конь — слон побьёт короля e1.',
   note:'Фиолетовым — слон создаёт связку. Красным — конь c3 связан. Синим — король, которого конь защищает.'},
  {id:7,title:'Мат в 1 ход',sub:'Задача!',
   fen:'6k1/5ppp/5Q2/8/8/8/5PPP/6KR w - - 0 1',
   hl:{h1:'#1565c077',f6:'#56ab6077'},
   tip:'Чёрный король на g8 заперт собственными пешками f7, g7, h7. Найди мат в один ход! Кликни на поле, куда должна пойти ладья h1.',
   note:'Синим — ладья h1. Зелёным — ферзь f6 контролирует поле f8. Одним ходом — мат!',
   puzzle:true,solution:'h8',moveName:'Лh8#',
   solNote:'Ладья встала на h8 — шах! Король g8 не может уйти: f8 закрыт ферзём f6, а f7, g7, h7 заняты собственными пешками чёрных. Мат!'}
];

var idx=0,solved=false,wrongSq=null,wTimer=null,hint=false;

function parseFEN(fen){
  return fen.split(' ')[0].split('/').map(function(row){
    var cells=[];
    for(var i=0;i<row.length;i++){
      var ch=row[i];
      if('12345678'.includes(ch)){for(var j=0;j<+ch;j++)cells.push(null);}
      else cells.push(ch);
    }
    return cells;
  });
}

function sqn(c,r){return FL[c]+RK[r];}
function isLt(c,r){return(c+r)%2===0;}

function renderBoard(){
  var L=LS[idx];
  var board=parseFEN(L.fen);
  var w=document.getElementById('bwrap');
  w.innerHTML='';
  for(var r=0;r<8;r++){
    var row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center';
    var rl=document.createElement('span');
    rl.style.cssText='width:14px;text-align:right;padding-right:3px;flex-shrink:0;font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);line-height:46px';
    rl.textContent=RK[r];
    row.appendChild(rl);
    for(var c=0;c<8;c++){
      var p=board[r][c];
      var s=sqn(c,r);
      var bg=isLt(c,r)?'#f0d9b5':'#b58863';
      var cell=document.createElement('div');
      cell.className='csq'+(L.puzzle&&!solved?' cp':'');
      cell.style.background=bg;
      var hl=L.hl&&L.hl[s];
      if(hl){var ov=document.createElement('div');ov.className='cov';ov.style.background=hl;cell.appendChild(ov);}
      if(wrongSq===s){var ov2=document.createElement('div');ov2.className='cov';ov2.style.background='#e5393566';cell.appendChild(ov2);}
      if(solved&&s===L.solution){var ov3=document.createElement('div');ov3.className='cov';ov3.style.background='#43a04766';cell.appendChild(ov3);}
      if(p){var sp=document.createElement('span');sp.className=p===p.toUpperCase()?'wp':'bp';sp.textContent=PC[p];cell.appendChild(sp);}
      if(L.puzzle&&!solved){(function(sq){cell.addEventListener('click',function(){handleClick(sq);});})(s);}
      row.appendChild(cell);
    }
    w.appendChild(row);
  }
  var frow=document.createElement('div');
  frow.style.cssText='display:flex;margin-left:14px';
  for(var fi=0;fi<8;fi++){
    var fd=document.createElement('div');
    fd.style.cssText='width:46px;text-align:center;font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono)';
    fd.textContent=FL[fi];
    frow.appendChild(fd);
  }
  w.appendChild(frow);
}

function handleClick(s){
  var L=LS[idx];
  if(!L.puzzle||solved)return;
  if(s===L.solution){solved=true;render();}
  else{wrongSq=s;render();if(wTimer)clearTimeout(wTimer);wTimer=setTimeout(function(){wrongSq=null;render();},700);}
}

function renderPanel(){
  var L=LS[idx];
  document.getElementById('lmeta').textContent='Урок '+L.id+' / '+LS.length+'  \u00b7  '+L.sub;
  document.getElementById('ltitle').textContent=L.title;
  document.getElementById('ltip').textContent=L.tip;
  document.getElementById('lnote').textContent=L.note;
  document.getElementById('pfill').style.width=((idx+1)/LS.length*100)+'%';
  var bp=document.getElementById('bprev');
  var bn=document.getElementById('bnext');
  bp.disabled=idx===0;bp.style.opacity=idx===0?'0.2':'1';
  bn.disabled=idx===LS.length-1;bn.style.opacity=idx===LS.length-1?'0.2':'1';

  var pa=document.getElementById('parea');
  pa.innerHTML='';
  if(L.puzzle&&!solved){
    var hbtn=document.createElement('button');
    hbtn.style.cssText='font-size:12px;margin-bottom:4px';
    hbtn.innerHTML='<i class="ti ti-bulb" aria-hidden="true" style="margin-right:4px"></i>'+(hint?'Скрыть подсказку':'Показать подсказку');
    hbtn.addEventListener('click',function(){hint=!hint;renderPanel();});
    pa.appendChild(hbtn);
    if(hint){var hp=document.createElement('p');hp.style.cssText='margin:0;font-size:12px;color:var(--color-text-secondary);line-height:1.7';hp.textContent='Ладья на h1 ходит по вертикали h. Куда ей пойти, чтобы дать шах королю на g8?';pa.appendChild(hp);}
  }
  if(solved&&L.puzzle){
    var sb=document.createElement('div');
    sb.style.cssText='background:var(--color-background-success);border:.5px solid var(--color-border-success);border-radius:var(--border-radius-md);padding:.625rem .75rem';
    sb.innerHTML='<div style="font-weight:500;font-size:13px;color:var(--color-text-success);margin-bottom:3px"><i class="ti ti-check" aria-hidden="true" style="margin-right:4px"></i>'+L.moveName+' \u2014 верно!</div><p style="margin:0;font-size:12px;color:var(--color-text-success);line-height:1.7">'+L.solNote+'</p>';
    pa.appendChild(sb);
  }

  var nd=document.getElementById('ndots');
  nd.innerHTML='';
  for(var i=0;i<LS.length;i++){
    var dot=document.createElement('button');
    dot.className='ndot';
    dot.setAttribute('aria-label','Урок '+(i+1));
    dot.style.background=i===idx?'var(--color-text-secondary)':'var(--color-border-tertiary)';
    (function(n){dot.addEventListener('click',function(){nav(n);});})(i);
    nd.appendChild(dot);
  }
}

function render(){renderBoard();renderPanel();}
function nav(n){idx=n;solved=false;wrongSq=null;hint=false;render();}

document.getElementById('bprev').addEventListener('click',function(){if(idx>0)nav(idx-1);});
document.getElementById('bnext').addEventListener('click',function(){if(idx<LS.length-1)nav(idx+1);});

render();
</script>
