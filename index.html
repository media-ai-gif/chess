<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шахматная академия</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%234A6650'/%3E%3Ctext x='16' y='25' font-size='21' text-anchor='middle' fill='white'%3E%E2%99%9E%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Ubuntu',sans-serif;background:#1A1D14;min-height:100vh;color:#E8E4D8}

/* NAV */
.topbar{background:#141710;border-bottom:1px solid #2A2E20;position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;padding:0 20px;gap:16px}
.logo{font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#8FB870;white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:8px}
.logo-sym{font-size:22px}
.topnav{display:flex;gap:2px;overflow-x:auto;flex:1}
.topnav::-webkit-scrollbar{display:none}
.tnb{background:transparent;border:none;padding:6px 14px;border-radius:8px;font-family:'Ubuntu',sans-serif;font-size:13px;color:#8A9080;cursor:pointer;white-space:nowrap;transition:all .15s}
.tnb:hover{background:#1E2218;color:#C8D4B8}
.tnb.on{background:#2A3020;color:#8FB870;font-weight:500}

/* PAGES */
.page{display:none;max-width:1000px;margin:0 auto;padding:28px 16px 60px}
.page.on{display:block}

/* ── HOME PAGE ── */
.hero{text-align:center;padding:48px 0 40px}
.hero-title{font-size:32px;font-weight:700;color:#E8E4D8;margin-bottom:10px}
.hero-sub{font-size:15px;font-weight:300;color:#7A8470;max-width:480px;margin:0 auto 32px}
.hero-play-btn{display:inline-flex;align-items:center;gap:10px;background:#5E8A40;color:#fff;border:none;border-radius:12px;padding:14px 28px;font-family:'Ubuntu',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s}
.hero-play-btn:hover{background:#6EA050;transform:translateY(-1px);box-shadow:0 6px 20px rgba(94,138,64,.35)}
.section-title{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#5A6050;margin-bottom:16px}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:40px}
.course-card{background:#1E2218;border:1px solid #2A2E20;border-radius:16px;padding:16px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:10px}
.course-card:hover{border-color:#5E8A40;background:#222818;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.cc-icon{font-size:36px;line-height:1}
.cc-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-bottom:2px}
.cc-title{font-size:15px;font-weight:500;color:#D8D4C8}
.cc-desc{font-size:12px;color:#5A6050;line-height:1.5}
.cc-steps{font-size:11px;color:#4A5040;margin-top:auto}
.cc-start{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.cc-arrow{font-size:16px;color:#5E8A40}

/* ── LESSON PLAYER ── */
#lesson-page{display:none;max-width:1000px;margin:0 auto;padding:20px 16px 60px}
#lesson-page.on{display:block}
.lp-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.back-btn{background:transparent;border:1px solid #2A2E20;border-radius:8px;color:#7A8470;font-family:'Ubuntu',sans-serif;font-size:13px;padding:6px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.back-btn:hover{border-color:#5E8A40;color:#8FB870}
.lp-title{font-size:16px;font-weight:500;color:#C8D4B8;flex:1}
.lp-progress-wrap{display:flex;align-items:center;gap:10px}
.lp-step-count{font-size:12px;color:#5A6050;white-space:nowrap}
.progress-track{height:4px;background:#2A2E20;border-radius:4px;overflow:hidden;width:120px}
.progress-fill{height:100%;background:#5E8A40;border-radius:4px;transition:width .4s ease}

.lp-body{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:start}
@media(max-width:640px){.lp-body{grid-template-columns:1fr}.lp-board-col{display:flex;flex-direction:column;align-items:center}}

/* BOARD */
.board-wrap{position:relative;line-height:0;flex-shrink:0}
.board-grid{display:inline-grid;grid-template-columns:repeat(8,1fr);border:2px solid #3A3E30;border-radius:4px;overflow:hidden}
.bsq{position:relative;display:flex;align-items:center;justify-content:center;cursor:default;user-select:none}
.bsq.clickable{cursor:pointer}
.bsq.clickable:hover{filter:brightness(1.12)}
.sq-ov{position:absolute;inset:0;pointer-events:none}
.piece{position:relative;z-index:3;line-height:1;pointer-events:none}
.pw{color:#F5EDD8;-webkit-text-stroke:.8px #1A1A14;text-shadow:0 1px 4px rgba(0,0,0,.7)}
.pb{color:#141010;text-shadow:0 1px 3px rgba(255,255,255,.2)}
.rank-labels{position:absolute;left:-18px;top:0;bottom:0;display:flex;flex-direction:column}
.rank-lbl{display:flex;align-items:center;justify-content:flex-end;font-size:10px;font-weight:600;color:#4A5040;font-family:'Ubuntu Mono',monospace}
.file-labels{display:flex;margin-top:3px}
.file-lbl{text-align:center;font-size:10px;font-weight:600;color:#4A5040;font-family:'Ubuntu Mono',monospace}

/* SVG arrow overlay */
.board-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:10}

/* MOVE DOT */
.mdot{position:absolute;width:32%;height:32%;border-radius:50%;background:rgba(94,138,64,.55);z-index:4;pointer-events:none}
.mcap-ring{position:absolute;inset:3px;border:3px solid rgba(94,138,64,.6);border-radius:2px;z-index:4;pointer-events:none}

/* FEEDBACK */
@keyframes correctFlash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.sq-correct{animation:correctFlash .7s ease forwards}
.board-wrong{animation:wrongShake .35s ease}

/* LESSON PANEL */
.lp-panel{display:flex;flex-direction:column;gap:14px;min-width:0}
.step-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#5A6A40;background:#1E2818;border:1px solid #3A4A28;border-radius:5px;padding:3px 9px;margin-bottom:6px}
.step-title{font-size:18px;font-weight:500;color:#D8D4C8;margin-bottom:8px;line-height:1.3}
.step-text{font-size:13.5px;line-height:1.9;color:#8A9080}
.step-hint{margin-top:10px;padding:10px 13px;background:#1A2010;border:1px solid #3A4A28;border-radius:9px;font-size:13px;color:#7AB050;line-height:1.7;display:flex;gap:8px;align-items:flex-start}
.step-success{margin-top:10px;padding:10px 13px;background:#142010;border:1px solid #3A5028;border-radius:9px;font-size:13px;color:#7ABF60;font-weight:500;display:none;align-items:center;gap:8px}
.lp-actions{display:flex;gap:10px;margin-top:16px;align-items:center}
.next-btn{background:#5E8A40;color:#fff;border:none;border-radius:10px;padding:11px 24px;font-family:'Ubuntu',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px}
.next-btn:hover:not(:disabled){background:#6EA050;transform:translateY(-1px)}
.next-btn:disabled{opacity:.35;cursor:default;transform:none}
.prev-btn{background:transparent;border:1px solid #2A2E20;color:#7A8470;border-radius:10px;padding:11px 16px;font-family:'Ubuntu',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.prev-btn:hover:not(:disabled){border-color:#4A5840;color:#B8C4A8}
.prev-btn:disabled{opacity:.25;cursor:default}

/* CONGRATS */
.congrats-overlay{display:none;position:fixed;inset:0;background:rgba(10,14,8,.85);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.congrats-overlay.on{display:flex}
.congrats-card{background:#1E2818;border:1px solid #5E8A40;border-radius:20px;padding:40px;text-align:center;max-width:380px}
.congrats-icon{font-size:56px;margin-bottom:12px}
.congrats-title{font-size:24px;font-weight:700;color:#D8D4C8;margin-bottom:8px}
.congrats-sub{font-size:14px;color:#7A8470;margin-bottom:24px}
.congrats-btn{background:#5E8A40;color:#fff;border:none;border-radius:10px;padding:12px 28px;font-family:'Ubuntu',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin:4px}
.congrats-btn2{background:transparent;border:1px solid #3A4A28;color:#8A9080;border-radius:10px;padding:12px 28px;font-family:'Ubuntu',sans-serif;font-size:14px;cursor:pointer;margin:4px}

/* PLAY PAGE */
#p-play{background:none;padding:0}
#p-play iframe,#play-container{width:100%;min-height:600px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" onclick="showPage('home')"><span class="logo-sym">&#9822;</span>Академия</div>
  <nav class="topnav">
    <button class="tnb on" data-p="home">&#127968; Главная</button>
    <button class="tnb" data-p="lessons">&#128218; Уроки</button>
    <button class="tnb" data-p="play">&#9822; Играть</button>
  </nav>
</div>

<!-- HOME -->
<div id="p-home" class="page on">
  <div class="hero">
    <div class="hero-title">Учись играть в шахматы</div>
    <div class="hero-sub">Пошаговые интерактивные уроки. Узнай как ходит каждая фигура, освой дебюты и тактику.</div>
    <button class="hero-play-btn" onclick="showPage('lessons')">&#128218; Начать обучение</button>
  </div>
  <div class="section-title">Курсы для начинающих</div>
  <div class="courses-grid" id="home-courses"></div>
</div>

<!-- LESSONS LIST -->
<div id="p-lessons" class="page">
  <div class="section-title">Все курсы</div>
  <div class="courses-grid" id="all-courses"></div>
</div>

<!-- LESSON PLAYER -->
<div id="lesson-page">
  <div class="lp-header">
    <button class="back-btn" id="back-btn">&#8592; Назад</button>
    <div class="lp-title" id="lp-course-title"></div>
    <div class="lp-progress-wrap">
      <div class="lp-step-count" id="step-count"></div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    </div>
  </div>
  <div class="lp-body">
    <div class="lp-board-col">
      <div style="position:relative;margin-left:20px">
        <div class="rank-labels" id="rank-labels"></div>
        <div class="board-wrap" id="board-wrap">
          <div class="board-grid" id="board-grid"></div>
          <svg class="board-svg" id="board-svg"></svg>
        </div>
        <div class="file-labels" id="file-labels"></div>
      </div>
    </div>
    <div class="lp-panel">
      <div class="step-badge" id="step-badge">Шаг 1</div>
      <div class="step-title" id="step-title"></div>
      <div class="step-text" id="step-text"></div>
      <div class="step-hint" id="step-hint" style="display:none"><span>&#128073;</span><span id="step-hint-text"></span></div>
      <div class="step-success" id="step-success"><span>&#10003;</span><span id="step-success-text"></span></div>
      <div class="lp-actions">
        <button class="prev-btn" id="prev-btn">&#8592;</button>
        <button class="next-btn" id="next-btn" disabled>Далее &#8594;</button>
      </div>
    </div>
  </div>
</div>

<!-- PLAY PAGE -->
<div id="p-play" class="page">
  <div id="play-container"></div>
</div>

<!-- CONGRATS -->
<div class="congrats-overlay" id="congrats">
  <div class="congrats-card">
    <div class="congrats-icon">&#127881;</div>
    <div class="congrats-title">Урок завершён!</div>
    <div class="congrats-sub" id="congrats-sub">Отличная работа! Ты усвоил этот материал.</div>
    <div><button class="congrats-btn" id="congrats-next">Следующий урок</button><button class="congrats-btn2" onclick="closeCongrats()">К списку уроков</button></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
<script>
(function(){
var FL=['a','b','c','d','e','f','g','h'];
var SQ=52;

/* ══════════════════════════════════════════
   COURSE DATA
══════════════════════════════════════════ */
var COURSES=[
{id:'king',title:'Король',icon:'&#9818;',color:'#D4A820',desc:'Самая важная фигура — узнай как она ходит',steps:[
  {title:'Знакомьтесь — Король!',text:'Король — самая важная фигура в шахматах. Если тебе поставят мат (король под атакой и некуда уйти) — ты проигрываешь. Поэтому его нужно защищать!',fen:'8/8/8/8/4K3/8/8/8 w - - 0 1',hl:['e4'],type:'info'},
  {title:'Как ходит Король?',text:'Король может ходить на одно поле в ЛЮБОМ направлении — вперёд, назад, в стороны и по диагонали. Посмотри на зелёные поля — это все возможные ходы короля с e4.',fen:'8/8/8/8/4K3/8/8/8 w - - 0 1',hl:['d3','d4','d5','e3','e5','f3','f4','f5'],type:'info'},
  {title:'Попробуй сам!',text:'Теперь твоя очередь. Переведи короля с e4 на поле e5. Сначала кликни на короля (он выделится), потом на зелёное поле.',fen:'8/8/8/8/4K3/8/8/8 w - - 0 1',hl:['e5'],type:'move',from:'e4',to:'e5',hint:'Кликни на ♔ на e4, затем на поле e5',success:'Отлично! Король перешёл на e5. Всё верно!'},
  {title:'Ещё один ход',text:'Хорошо! Теперь попробуй диагональный ход — переведи короля с e5 на f6.',fen:'8/8/8/4K3/8/8/8/8 w - - 0 1',hl:['f6'],type:'move',from:'e5',to:'f6',hint:'Диагональный ход: кликни ♔ на e5 → f6',success:'Молодец! Диагональный ход — тоже одно поле.'},
  {title:'Король не может ходить под шах',text:'Важное правило: король НЕ МОЖЕТ ступить на поле, которое атакует соперник. На доске чёрная ладья атакует поля вертикали e. Красные поля — запрещены для короля.',fen:'8/8/4r3/8/4K3/8/8/8 w - - 0 1',hl:['d3','d4','d5','f3','f4','f5'],hl2:['e3','e5'],type:'info'},
  {title:'Куда может пойти Король?',text:'Ладья чёрных на e6 атакует всю вертикаль e. Король должен уйти с вертикали e! Переведи его на d5.',fen:'8/8/4r3/8/4K3/8/8/8 w - - 0 1',hl:['d5'],hl2:['e3','e5'],type:'move',from:'e4',to:'d5',hint:'Уходи от ладьи! Ладья бьёт всю колонку e. Иди на d5.',success:'Правильно! Ты ушёл с атакованной вертикали.'},
  {title:'Шах и мат',text:'«Шах» — когда король под атакой. Ты обязан его защитить. «Мат» — шах, от которого невозможно уйти. Это конец игры!',fen:'6k1/5ppp/8/8/8/8/5PPP/5RK1 w - - 0 1',hl:['f1'],type:'info'},
  {title:'Урок завершён!',text:'Ты узнал всё о короле:\n✓ Ходит на 1 поле в любом направлении\n✓ Не может ступить на атакованное поле\n✓ Цель игры — защитить своего короля\n\nОтличная работа!',fen:'8/8/8/8/4K3/8/8/8 w - - 0 1',hl:[],type:'info',last:true}
]},

{id:'queen',title:'Ферзь',icon:'&#9819;',color:'#9B59B6',desc:'Самая сильная фигура — 9 очков',steps:[
  {title:'Ферзь — царица доски!',text:'Ферзь — самая мощная фигура. Она стоит 9 очков! Ферзь сочетает силу ладьи и слона: ходит по горизонталям, вертикалям и диагоналям на любое расстояние.',fen:'8/8/8/8/3Q4/8/8/8 w - - 0 1',hl:['d4'],type:'info'},
  {title:'Ферзь ходит по вертикали и горизонтали',text:'Как ладья — ферзь может пройти весь ряд или всю колонку за один ход. Зелёные поля показывают ходы по горизонтали и вертикали.',fen:'8/8/8/8/3Q4/8/8/8 w - - 0 1',hl:['d1','d2','d3','d5','d6','d7','d8','a4','b4','c4','e4','f4','g4','h4'],type:'info'},
  {title:'Ферзь ходит по диагонали',text:'Как слон — ферзь ходит по всем четырём диагоналям. Это делает его невероятно сильным! Зелёными выделены диагональные ходы.',fen:'8/8/8/8/3Q4/8/8/8 w - - 0 1',hl:['a1','b2','c3','e5','f6','g7','h8','a7','b6','c5','e3','f2','g1'],type:'info'},
  {title:'Переведи ферзя',text:'Ферзь на d1. Переведи его на d5 — прямо в центр доски!',fen:'8/8/8/8/8/8/8/3Q4 w - - 0 1',hl:['d5'],type:'move',from:'d1',to:'d5',hint:'Кликни ♛ на d1, затем на d5',success:'Отлично! Ферзь прошёл через всю доску за один ход!'},
  {title:'Ферзь атакует по диагонали',text:'Теперь переведи ферзя с d5 на h5 — горизонтальный ход.',fen:'8/8/8/3Q4/8/8/8/8 w - - 0 1',hl:['h5'],type:'move',from:'d5',to:'h5',hint:'Горизонтальный ход — ферзь идёт вдоль 5-й горизонтали',success:'Правильно! Ферзь контролирует всю 5-ю горизонталь.'},
  {title:'Ферзь не прыгает',text:'Важно: ферзь не может перепрыгивать через другие фигуры! Он останавливается перед ними. В этой позиции белый ферзь не может пройти к королю чёрных — путь заблокирован пешкой.',fen:'8/6k1/6p1/8/8/8/8/3Q4 w - - 0 1',hl:['g6'],type:'info'},
  {title:'Найди лучший ход!',text:'Ферзь на d1. Найди ход, которым ферзь даёт шах королю на g8! Подсказка: есть диагональный путь.',fen:'8/6k1/8/8/8/8/8/3Q4 w - - 0 1',hl:['g4'],type:'move',from:'d1',to:'g4',hint:'Ферзь с d1 может выйти на g4 — оттуда диагональ бьёт короля g7',success:'Здорово! С g4 ферзь угрожает по диагонали.'},
  {title:'Урок завершён!',text:'Ты узнал о ферзе:\n✓ Ходит по горизонталям, вертикалям и диагоналям\n✓ На любое расстояние за один ход\n✓ Самая сильная фигура (9 очков)\n✓ Не перепрыгивает через фигуры',fen:'8/8/8/8/3Q4/8/8/8 w - - 0 1',hl:[],type:'info',last:true}
]},

{id:'rook',title:'Ладья',icon:'&#9820;',color:'#E74C3C',desc:'Мощная фигура дальнего действия — 5 очков',steps:[
  {title:'Ладья — башня!',text:'Ладья похожа на башню крепости. Она стоит 5 очков и является второй по силе фигурой после ферзя. В начале игры ладьи стоят по углам доски.',fen:'8/8/8/8/3R4/8/8/8 w - - 0 1',hl:['d4'],type:'info'},
  {title:'Как ходит ладья?',text:'Ладья ходит на любое количество полей ТОЛЬКО по горизонталям и вертикалям. Диагонали — не для неё! Зелёные поля показывают все возможные ходы.',fen:'8/8/8/8/3R4/8/8/8 w - - 0 1',hl:['a4','b4','c4','e4','f4','g4','h4','d1','d2','d3','d5','d6','d7','d8'],type:'info'},

/* ══════════════════════════════════════════
   BOARD RENDERING
══════════════════════════════════════════ */
var PC={K:'&#9818;',Q:'&#9819;',R:'&#9820;',B:'&#9821;',N:'&#9822;',P:'&#9823;',
        k:'&#9818;',q:'&#9819;',r:'&#9820;',b:'&#9821;',n:'&#9822;',p:'&#9823;'};

function isLt(c,r){return(c+r)%2===0;}

function renderBoard(fen,hl,hl2,selSq,legalDests,movable){
  var grid=document.getElementById('board-grid');
  var svg=document.getElementById('board-svg');
  grid.innerHTML=''; svg.innerHTML='';
  var sqSz=SQ;
  grid.style.width=(sqSz*8)+'px';
  svg.setAttribute('width',sqSz*8);svg.setAttribute('height',sqSz*8);
  document.querySelectorAll('.rank-lbl').forEach(function(e){e.style.height=sqSz+'px';});
  document.querySelectorAll('.file-lbl').forEach(function(e){e.style.width=sqSz+'px';});

  var chessPos=(typeof Chess!=='undefined')&&fen&&fen!=='8/8/8/8/8/8/8/8 w - - 0 1'?new Chess(fen):null;

  for(var r=0;r<8;r++){
    for(var c=0;c<8;c++){
      var rn=8-r; var fi=c;
      var sq=FL[fi]+rn;
      var bg=isLt(c,r)?'#F0D9B5':'#B58863';
      var cell=document.createElement('div');
      cell.className='bsq';
      cell.style.cssText='width:'+sqSz+'px;height:'+sqSz+'px;background:'+bg;
      cell.dataset.sq=sq;

      if(selSq===sq){var y=document.createElement('div');y.className='sq-ov';y.style.background='rgba(255,210,0,.52)';cell.appendChild(y);}
      if(hl&&hl.indexOf(sq)>-1){var g=document.createElement('div');g.className='sq-ov';g.style.background='rgba(94,138,64,.45)';cell.appendChild(g);}
      if(hl2&&hl2.indexOf(sq)>-1){var r2=document.createElement('div');r2.className='sq-ov';r2.style.background='rgba(200,50,40,.4)';cell.appendChild(r2);}
      if(legalDests&&legalDests.indexOf(sq)>-1){
        var p2=chessPos?chessPos.get(sq):null;
        var dot=document.createElement('div');dot.className=p2?'mcap-ring':'mdot';cell.appendChild(dot);
      }

      var piece=chessPos?chessPos.get(sq):null;
      if(piece){
        var sp=document.createElement('span');
        sp.className='piece '+(piece.color==='w'?'pw':'pb');
        sp.style.fontSize=(sqSz*.72)+'px';
        sp.innerHTML=PC[piece.color==='w'?piece.type.toUpperCase():piece.type];
        cell.appendChild(sp);
      }
      if(movable)cell.className+=' clickable';
      grid.appendChild(cell);
    }
  }

  // Rank labels
  var rlWrap=document.getElementById('rank-labels');rlWrap.innerHTML='';
  for(var ri=0;ri<8;ri++){var rl=document.createElement('div');rl.className='rank-lbl';rl.style.height=sqSz+'px';rl.textContent=8-ri;rlWrap.appendChild(rl);}
  // File labels
  var flWrap=document.getElementById('file-labels');flWrap.innerHTML='';
  for(var ci=0;ci<8;ci++){var fl=document.createElement('div');fl.className='file-lbl';fl.style.width=sqSz+'px';fl.textContent=FL[ci];flWrap.appendChild(fl);}
}

function drawArrow(fromSq,toSq,color){
  var svg=document.getElementById('board-svg');
  color=color||'rgba(200,160,40,.8)';
  var fc=FL.indexOf(fromSq[0]),fr=8-parseInt(fromSq[1]);
  var tc=FL.indexOf(toSq[0]),tr=8-parseInt(toSq[1]);
  var x1=(fc+.5)*SQ,y1=(fr+.5)*SQ;
  var x2=(tc+.5)*SQ,y2=(tr+.5)*SQ;
  var dx=x2-x1,dy=y2-y1;
  var len=Math.sqrt(dx*dx+dy*dy);
  var ux=dx/len,uy=dy/len;
  var head=SQ*.28;
  var ax=x2-ux*head,ay=y2-uy*head;
  var px=-uy*head*.45,py=ux*head*.45;

  var path=document.createElementNS('http://www.w3.org/2000/svg','path');
  var d='M'+x1+','+y1+' L'+ax+','+ay+' M'+x2+','+y2+' L'+(ax+px)+','+(ay+py)+' L'+x2+','+y2+' L'+(ax-px)+','+(ay-py)+' Z';
  var line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',x1);line.setAttribute('y1',y1);
  line.setAttribute('x2',ax);line.setAttribute('y2',ay);
  line.setAttribute('stroke',color);line.setAttribute('stroke-width','5');
  line.setAttribute('stroke-linecap','round');line.setAttribute('opacity','.75');
  svg.appendChild(line);

  var head_poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  head_poly.setAttribute('points',x2+','+y2+' '+(ax+px)+','+(ay+py)+' '+(ax-px)+','+(ay-py));
  head_poly.setAttribute('fill',color);head_poly.setAttribute('opacity','.75');
  svg.appendChild(head_poly);
}

/* ══════════════════════════════════════════
   LESSON PLAYER
══════════════════════════════════════════ */
var currentCourse=null, currentStep=0, stepDone=false, selSq=null, legalDests=[];

function loadCourse(courseId){
  currentCourse=COURSES.find(function(c){return c.id===courseId;});
  currentStep=0; stepDone=false; selSq=null; legalDests=[];
  document.getElementById('lp-course-title').textContent=currentCourse.title;
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tnb').forEach(function(b){b.classList.remove('on');});
  document.getElementById('lesson-page').classList.add('on');
  renderStep();
}

function renderStep(){
  var step=currentCourse.steps[currentStep];
  stepDone=(step.type==='info');
  selSq=null; legalDests=[];

  document.getElementById('step-badge').textContent='Шаг '+(currentStep+1);
  document.getElementById('step-title').textContent=step.title;
  document.getElementById('step-text').innerHTML=step.text.replace(/\n/g,'<br>');
  document.getElementById('step-count').textContent=(currentStep+1)+' / '+currentCourse.steps.length;
  document.getElementById('prog-fill').style.width=((currentStep+1)/currentCourse.steps.length*100)+'%';

  var hint=document.getElementById('step-hint');
  var succ=document.getElementById('step-success');
  succ.style.display='none';
  if(step.hint&&!stepDone){hint.style.display='flex';document.getElementById('step-hint-text').textContent=step.hint;}
  else hint.style.display='none';

  var nb=document.getElementById('next-btn');
  nb.disabled=!stepDone;
  nb.textContent=step.last?'Завершить урок &#127881;':'Далее &#8594;';

  var pb=document.getElementById('prev-btn');
  pb.disabled=currentStep===0;

  renderBoard(step.fen,step.hl,step.hl2,null,[],step.type==='move');

  if(step.type==='move'&&step.from&&step.to){
    drawArrow(step.from,step.to,'rgba(94,138,64,.7)');
  }

  // Attach click handlers
  document.getElementById('board-grid').querySelectorAll('.bsq').forEach(function(cell){
    cell.addEventListener('click',onBoardClick);
  });
}

function onBoardClick(e){
  var step=currentCourse.steps[currentStep];
  if(step.type!=='move'||stepDone)return;
  var sq=this.dataset.sq;
  if(!sq)return;

  var chessPos=new Chess(step.fen);

  if(!selSq){
    // Select piece
    var p=chessPos.get(sq);
    if(p&&p.color==='w'){
      selSq=sq;
      legalDests=chessPos.moves({square:sq,verbose:true}).map(function(m){return m.to;});
      renderBoard(step.fen,step.hl,step.hl2,selSq,legalDests,true);
      if(step.type==='move'&&step.from&&step.to)drawArrow(step.from,step.to,'rgba(94,138,64,.7)');
      document.getElementById('board-grid').querySelectorAll('.bsq').forEach(function(cell){cell.addEventListener('click',onBoardClick);});
    }
  } else {
    if(sq===selSq){selSq=null;legalDests=[];renderBoard(step.fen,step.hl,step.hl2,null,[],true);if(step.from&&step.to)drawArrow(step.from,step.to,'rgba(94,138,64,.7)');document.getElementById('board-grid').querySelectorAll('.bsq').forEach(function(c){c.addEventListener('click',onBoardClick);});return;}
    // Try move
    var targetSq=sq;
    if(selSq===step.from&&(targetSq===step.to)){
      // CORRECT
      var res=chessPos.move({from:selSq,to:targetSq,promotion:'q'});
      if(res){
        stepDone=true;
        var newFen=chessPos.fen();
        renderBoard(newFen,step.hl,[],null,[],false);
        // Flash correct
        var dest=document.querySelector('.bsq[data-sq="'+targetSq+'"]');
        if(dest){var flash=document.createElement('div');flash.className='sq-ov sq-correct';flash.style.background='rgba(94,200,64,.6)';dest.appendChild(flash);setTimeout(function(){if(flash.parentNode)flash.parentNode.removeChild(flash);},700);}
        var succ=document.getElementById('step-success');
        succ.style.display='flex';document.getElementById('step-success-text').textContent=step.success||'Правильно!';
        document.getElementById('step-hint').style.display='none';
        document.getElementById('next-btn').disabled=false;
        selSq=null;legalDests=[];
      }
    } else {
      // WRONG
      if(legalDests.indexOf(targetSq)>-1){
        var wrongFlash=document.createElement('div');wrongFlash.className='sq-ov sq-correct';wrongFlash.style.background='rgba(200,50,40,.5)';
        var destCell=document.querySelector('.bsq[data-sq="'+targetSq+'"]');
        if(destCell){destCell.appendChild(wrongFlash);setTimeout(function(){if(wrongFlash.parentNode)wrongFlash.parentNode.removeChild(wrongFlash);},500);}
      }
      selSq=null;legalDests=[];
      renderBoard(step.fen,step.hl,step.hl2,null,[],true);
      if(step.from&&step.to)drawArrow(step.from,step.to,'rgba(94,138,64,.7)');
      document.getElementById('board-grid').querySelectorAll('.bsq').forEach(function(c){c.addEventListener('click',onBoardClick);});
    }
  }
}

document.getElementById('next-btn').addEventListener('click',function(){
  var step=currentCourse.steps[currentStep];
  if(step.last){showCongrats();return;}
  if(currentStep<currentCourse.steps.length-1){currentStep++;stepDone=false;renderStep();}
});
document.getElementById('prev-btn').addEventListener('click',function(){
  if(currentStep>0){currentStep--;stepDone=false;renderStep();}
});
document.getElementById('back-btn').addEventListener('click',function(){
  document.getElementById('lesson-page').classList.remove('on');
  showPage('lessons');
});

/* ══════════════════════════════════════════
   CONGRATS
══════════════════════════════════════════ */
function showCongrats(){
  var idx=COURSES.findIndex(function(c){return c.id===currentCourse.id;});
  var nextCourse=COURSES[idx+1];
  document.getElementById('congrats-sub').textContent='Ты завершил урок «'+currentCourse.title+'»! '+(nextCourse?'Готов к следующему?':'Все уроки пройдены!');
  var nb=document.getElementById('congrats-next');
  if(nextCourse){nb.textContent='Следующий: '+nextCourse.title;nb.onclick=function(){closeCongrats();loadCourse(nextCourse.id);};}
  else{nb.textContent='К списку уроков';nb.onclick=function(){closeCongrats();showPage('lessons');};}
  document.getElementById('congrats').classList.add('on');
}
window.closeCongrats=function(){document.getElementById('congrats').classList.remove('on');};

/* ══════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════ */
function showPage(p){
  document.getElementById('lesson-page').classList.remove('on');
  document.querySelectorAll('.page').forEach(function(pg){pg.classList.remove('on');});
  document.querySelectorAll('.tnb').forEach(function(b){b.classList.remove('on');});
  document.getElementById('p-'+p).classList.add('on');
  var btn=document.querySelector('.tnb[data-p="'+p+'"]');if(btn)btn.classList.add('on');
}
document.querySelectorAll('.tnb').forEach(function(btn){
  btn.addEventListener('click',function(){showPage(this.dataset.p);});
});

/* ══════════════════════════════════════════
   BUILD COURSE CARDS
══════════════════════════════════════════ */
function buildCourseCard(c){
  var card=document.createElement('div');card.className='course-card';
  card.innerHTML='<div class="cc-icon">'+c.icon+'</div><div><div class="cc-title">'+c.title+'</div><div class="cc-desc">'+c.desc+'</div></div><div class="cc-steps">'+c.steps.length+' шагов</div><div class="cc-start"><span style="font-size:12px;color:#5A6050">Начать</span><span class="cc-arrow">&#8594;</span></div>';
  card.addEventListener('click',function(){loadCourse(c.id);});
  return card;
}

var hg=document.getElementById('home-courses');
var ag=document.getElementById('all-courses');
COURSES.forEach(function(c){hg.appendChild(buildCourseCard(c));ag.appendChild(buildCourseCard(c));});

})();
</script>
